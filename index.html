<title>Euro Ecologic — Șofer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --verde-inchis:#173d2c; --verde:#2f7a52; --verde-hover:#25603f; --verde-pal:#eaf3ec;
  --fundal:#f5f6f4; --card:#ffffff; --linie:#e1e4df; --text:#1b2621; --text-slab:#5f6d64;
  --galben:#c98a1f; --galben-bg:#fbf1de; --albastru:#2f6fa8; --albastru-bg:#e9f1f9;
  --verde-status:#2f8f5b; --verde-status-bg:#e6f4ec; --rosu:#c1443f; --rosu-bg:#faeaea;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:var(--fundal);}
body{font-family:'Inter',sans-serif;color:var(--text);overscroll-behavior-y:contain;}
h1,h2,h3,.brand{font-family:'Manrope',sans-serif;}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--fundal);padding-bottom:30px;}

.header-app{background:var(--verde-inchis);color:#fff;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
.header-app .brand{font-size:16px;font-weight:800;}
.header-app .brand small{display:block;font-family:'Inter';font-weight:400;font-size:11px;color:#9fc7ac;}
.header-app button.iesire{all:unset;cursor:pointer;color:#cfe8db;font-size:12.5px;font-weight:600;}

.ecran{padding:18px;}
.gol{text-align:center;padding:60px 20px;color:var(--text-slab);}
.gol .emoji{font-size:38px;margin-bottom:10px;}

.btn{all:unset;cursor:pointer;background:var(--verde);color:#fff;padding:13px 18px;border-radius:10px;font-size:14.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:7px;width:100%;text-align:center;}
.btn:active{background:var(--verde-hover);}
.btn.secundar{background:#fff;color:var(--verde);border:1.5px solid var(--verde);}
.btn.pericol{background:var(--rosu);}
.btn.mic{padding:9px 14px;font-size:13px;width:auto;}
.btn[disabled]{opacity:.45;}

input,select{font-family:'Inter';font-size:16px;padding:13px 14px;border:1.5px solid var(--linie);border-radius:10px;background:#fff;color:var(--text);width:100%;}
input:focus,select:focus{outline:none;border-color:var(--verde);}
label{font-size:12.5px;font-weight:700;color:var(--text-slab);display:block;margin-bottom:6px;}
.camp{margin-bottom:14px;}

.card{background:var(--card);border:1px solid var(--linie);border-radius:12px;padding:15px 16px;margin-bottom:11px;}

.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge.pendinte{background:var(--galben-bg);color:var(--galben);}
.badge.in_lucru{background:var(--albastru-bg);color:var(--albastru);}
.badge.finalizat{background:var(--verde-status-bg);color:var(--verde-status);}
.badge.problema{background:var(--rosu-bg);color:var(--rosu);}
.badge.tip{background:#eef0ec;color:#4b564f;}

/* LOGIN */
.login-wrap{display:flex;flex-direction:column;justify-content:center;min-height:88vh;padding:26px;}
.login-logo{text-align:center;margin-bottom:30px;}
.login-logo .titlu{font-size:22px;font-weight:800;color:var(--verde-inchis);}
.login-logo .sub{font-size:13px;color:var(--text-slab);margin-top:4px;}
.lista-soferi-login{max-height:260px;overflow-y:auto;margin-bottom:16px;}
.sofer-opt{padding:13px 14px;border:1.5px solid var(--linie);border-radius:10px;margin-bottom:8px;cursor:pointer;font-weight:700;font-size:14.5px;}
.sofer-opt.activ{border-color:var(--verde);background:var(--verde-pal);color:var(--verde-inchis);}

/* LISTA SARCINI */
.filtre-data{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.sarcina-card{padding:15px 16px;}
.sarcina-card .client{font-weight:700;font-size:15px;margin-bottom:3px;}
.sarcina-card .produs{font-size:13px;color:var(--text-slab);margin-bottom:8px;}
.sarcina-card .adresa{font-size:12.5px;color:var(--text-slab);margin-bottom:10px;}
.sarcina-card .rand-jos{display:flex;justify-content:space-between;align-items:center;}

/* EXECUTIE SARCINA */
.info-sarcina{margin-bottom:16px;}
.info-sarcina .detalii-linie{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--linie);font-size:13.5px;}
.info-sarcina .detalii-linie span:first-child{color:var(--text-slab);}
.info-sarcina .detalii-linie span:last-child{font-weight:600;text-align:right;}

.sectiune-titlu{font-size:13.5px;font-weight:800;margin:20px 0 10px;color:var(--verde-inchis);display:flex;align-items:center;gap:6px;}
.checklist-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:#fff;border:1.5px solid var(--linie);border-radius:9px;margin-bottom:7px;font-size:13.5px;}
.checklist-item input[type=checkbox]{width:19px;height:19px;flex-shrink:0;}
.checklist-item.bifat{border-color:var(--verde);background:var(--verde-pal);}

.poze-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.poza-thumb{position:relative;border-radius:9px;overflow:hidden;aspect-ratio:1;border:1.5px solid var(--linie);}
.poza-thumb img{width:100%;height:100%;object-fit:cover;}
.poza-thumb .sterge-poza{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;
  width:20px;height:20px;font-size:12px;cursor:pointer;line-height:1;}
.adauga-poza-btn{aspect-ratio:1;border:2px dashed var(--linie);border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:26px;color:var(--text-slab);cursor:pointer;background:#fafaf8;}
.gps-info{font-size:11.5px;color:var(--text-slab);margin-bottom:12px;}

.toggle-semnatar{display:flex;gap:8px;margin-bottom:10px;}
.toggle-semnatar button{all:unset;flex:1;text-align:center;padding:9px;border-radius:8px;font-size:12.5px;font-weight:700;
  border:1.5px solid var(--linie);color:var(--text-slab);cursor:pointer;}
.toggle-semnatar button.activ{background:var(--verde);color:#fff;border-color:var(--verde);}
.canvas-semnatura-wrap{border:1.5px solid var(--linie);border-radius:10px;overflow:hidden;background:#fff;margin-bottom:8px;}
#canvas-semnatura{width:100%;height:170px;display:block;touch-action:none;}
.semnatura-actiuni{display:flex;gap:8px;margin-bottom:16px;}

.pas-status{display:flex;gap:6px;margin-bottom:18px;}
.pas-status .pas{flex:1;height:4px;border-radius:3px;background:var(--linie);}
.pas-status .pas.ok{background:var(--verde);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--verde-inchis);color:#fff;
  padding:12px 20px;border-radius:9px;font-size:13.5px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:100;opacity:0;
  transition:.25s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.arata{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.eroare{background:var(--rosu);}

.overlay-incarcare{position:fixed;inset:0;background:rgba(23,61,44,.92);color:#fff;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;z-index:200;text-align:center;padding:30px;}
.overlay-incarcare.activ{display:flex;}
.spinner{width:38px;height:38px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:rot 0.8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
</style>
</head>

function toast(msg, eroare=false){
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast arata" + (eroare?" eroare":"");
  setTimeout(()=> t.className="toast", 2600);
}
function incarcare(activ, text="Se procesează..."){
  document.getElementById("txt-incarcare").textContent = text;
  document.getElementById("overlay-incarcare").className = "overlay-incarcare" + (activ?" activ":"");
}
function esc(s){ return (s===null||s===undefined) ? "" : String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtData(d){ if(!d) return "-"; return new Date(d).toLocaleDateString("ro-RO",{day:"2-digit",month:"2-digit",year:"numeric"}); }
async function q(promise, msg="Eroare"){ const {data,error} = await promise; if(error){ console.error(error); toast(msg+": "+error.message, true); throw error; } return data; }

/* ===================== RANDARE PRINCIPALA ===================== */
function randApp(){
  const app = document.getElementById("app");
  if(state.ecran==="login") return randLogin(app);
  app.innerHTML = `
    <div class="header-app">
      <div class="brand">Euro Ecologic <small>${state.soferCurent?esc(state.soferCurent.nume):""}</small></div>
      ${state.ecran!=="login" ? `<button class="iesire" id="btn-iesire">Ieși din cont</button>` : ""}
    </div>
    <div class="ecran" id="ecran-continut"></div>
  `;
  const bi = document.getElementById("btn-iesire");
  if(bi) bi.addEventListener("click", ()=>{
    if(confirm("Ieși din contul curent?")){ localStorage.removeItem("euroeco_sofer_curent"); state.soferCurent=null; state.ecran="login"; randApp(); }
  });
  if(state.ecran==="lista") randListaSarcini();
  else if(state.ecran==="executie") randExecutieSarcina();
}

    </div>
  `;
  let soferi;

/* ===================== LISTA SARCINI ===================== */
async function randListaSarcini(){
  const el = document.getElementById("ecran-continut");
  el.innerHTML = `<div class="gol">Se încarcă sarcinile...</div>`;

  let sarcini;
  try{
    sarcini = await q(
      supa.from("sarcini").select("*").eq("sofer_id", state.soferCurent.id).eq("data", state.sarciniData).order("created_at"),
      "Nu am putut încărca sarcinile"
    );
  }catch(e){ return; }

  const [contracte, produse, clienti] = await Promise.all([
    q(supa.from("contracte").select("*")), q(supa.from("produse").select("*")), q(supa.from("clienti").select("*")),
  ]);
  state.sarciniLista = sarcini;
  state._contracte = contracte; state._produse = produse; state._clienti = clienti;

  function numeClient(contractId){
    const c = contracte.find(x=>x.id===contractId); if(!c) return "-";
    const cl = clienti.find(x=>x.id===c.client_id); return cl ? cl.nume : "-";
  }

  el.innerHTML = `
    <div class="filtre-data">
      <input type="date" id="input-data-sofer" value="${state.sarciniData}" style="flex:1;">
    </div>
    <div id="lista-sarcini-sofer"></div>
  `;
  document.getElementById("input-data-sofer").addEventListener("change", e=>{ state.sarciniData = e.target.value; randListaSarcini(); });

  const lista = document.getElementById("lista-sarcini-sofer");
  if(sarcini.length===0){
    lista.innerHTML = `<div class="gol"><div class="emoji">☀️</div>Nicio sarcină alocată pentru această dată.</div>`;
    return;
  }
  lista.innerHTML = sarcini.map(s=>{
    const produs = produse.find(p=>p.id===s.produs_id);
    const poateExecuta = s.status==="pendinte" || s.status==="in_lucru";
    return `
      <div class="card sarcina-card ${poateExecuta?'clicabil':''}" data-id="${s.id}" style="${poateExecuta?'cursor:pointer;':'opacity:.7;'}">
        <div class="client">${esc(numeClient(s.contract_id))}</div>
        <div class="produs">${produs?esc(produs.model):"—"}</div>
        <div class="adresa">📍 ${esc([s.locatie_localitate,s.locatie_adresa].filter(Boolean).join(", ")) || "adresă nespecificată"}</div>
        <div class="rand-jos">
          <span class="badge tip">${LABEL_TIP[s.tip_actiune]||s.tip_actiune}</span>
          <span class="badge ${s.status}">${LABEL_STATUS[s.status]||s.status}</span>
        </div>
      </div>
    `;
  }).join("");
  lista.querySelectorAll(".sarcina-card.clicabil").forEach(card=>{
    card.addEventListener("click", ()=> deschideExecutie(card.dataset.id));
  });
}

function deschideExecutie(sarcinaId){
  const s = state.sarciniLista.find(x=>x.id===sarcinaId);
  if(!s) return;
  const contract = state._contracte.find(c=>c.id===s.contract_id);
  const client = contract ? state._clienti.find(cl=>cl.id===contract.client_id) : null;
  const produs = state._produse.find(p=>p.id===s.produs_id);
  state.sarcinaActiva = s;
  state.detaliiSarcinaActiva = { contract, client, produs };
  state.checklistBifat = {};
  state.poze = [];
  state.semnatarTip = "client";
  state.semnaturaDataUrl = null;
  state.nrPv = s.nr_pv || sugereazaNrPv();
  state.ecran = "executie";
  randApp();
}

function sugereazaNrPv(){
  const d = new Date();
  const zi = String(d.getDate()).padStart(2,"0"), luna = String(d.getMonth()+1).padStart(2,"0");
  const scurt = Math.random().toString(36).slice(2,6).toUpperCase();
  return `PV-${d.getFullYear()}${luna}${zi}-${scurt}`;
}

async function handleFotoSelectata(e){
  const file = e.target.files[0];
  if(!file) return;
  e.target.value = "";
  incarcare(true, "Se citește locația GPS...");
  try{
    const pozitie = await new Promise((res)=>{
      if(!navigator.geolocation){ res(null); return; }
      navigator.geolocation.getCurrentPosition(
        p=>res({lat:p.coords.latitude, lon:p.coords.longitude}),
        ()=>res(null),
        {enableHighAccuracy:true, timeout:8000}
      );
    });
    const dataUrlOriginal = await fileToDataUrl(file);
    const dataUrlCuOverlay = await adaugaOverlayPePoza(dataUrlOriginal, pozitie);
    state.poze.push({ dataUrl: dataUrlCuOverlay, lat: pozitie?.lat, lon: pozitie?.lon, timp: new Date().toISOString() });
    incarcare(false);
    randExecutieSarcina();
  }catch(err){
    incarcare(false);
    toast("Eroare la procesarea pozei", true);
  }
}
function fileToDataUrl(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function adaugaOverlayPePoza(dataUrl, pozitie){
  const img = await new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=dataUrl; });
  const canvas = document.createElement("canvas");
  canvas.width = img.width; canvas.height = img.height;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img,0,0);

  const s = state.sarcinaActiva;
  const { client, produs } = state.detaliiSarcinaActiva;
  const acum = new Date();
  const linii = [
    `${client?.nume||"-"} — ${LABEL_TIP[s.tip_actiune]||s.tip_actiune}`,
    `Produs: ${produs?.model||"-"}`,
    `Adresă: ${[s.locatie_localitate, s.locatie_adresa].filter(Boolean).join(", ")||"-"}`,
    `GPS: ${pozitie ? pozitie.lat.toFixed(6)+", "+pozitie.lon.toFixed(6) : "indisponibil"}`,
    `Șofer: ${state.soferCurent.nume} · ${acum.toLocaleString("ro-RO")}`,
  ];
  const fontSize = Math.max(16, Math.round(canvas.width/38));
  const padding = fontSize*0.6;
  const inaltimeBara = (linii.length * (fontSize+6)) + padding*2;

  ctx.fillStyle = "rgba(10,20,15,0.62)";
  ctx.fillRect(0, canvas.height - inaltimeBara, canvas.width, inaltimeBara);
  ctx.fillStyle = "#ffffff";
  ctx.font = `600 ${fontSize}px Arial, sans-serif`;
  ctx.textBaseline = "top";
  linii.forEach((linie, i)=>{
    ctx.fillText(linie, padding, canvas.height - inaltimeBara + padding + i*(fontSize+6));
  });
  return canvas.toDataURL("image/jpeg", 0.85);
}

/* ---------- Canvas semnatura (desen touch/mouse) ---------- */
function initCanvasSemnatura(){
  const canvas = document.getElementById("canvas-semnatura");
  const ctx = canvas.getContext("2d");
  const raport = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * raport; canvas.height = rect.height * raport;
  ctx.scale(raport, raport);
  ctx.lineWidth = 2.2; ctx.lineCap="round"; ctx.strokeStyle="#173d2c";

  let deseneaza = false, ultimX=0, ultimY=0;
  function pozitieDinEvent(e){
    const r = canvas.getBoundingClientRect();
    const pct = e.touches ? e.touches[0] : e;
    return { x: pct.clientX - r.left, y: pct.clientY - r.top };
  }
  function start(e){ e.preventDefault(); deseneaza=true; const p=pozitieDinEvent(e); ultimX=p.x; ultimY=p.y; }
  function move(e){
    if(!deseneaza) return; e.preventDefault();
    const p = pozitieDinEvent(e);
    ctx.beginPath(); ctx.moveTo(ultimX,ultimY); ctx.lineTo(p.x,p.y); ctx.stroke();
    ultimX=p.x; ultimY=p.y;
  }
  function stop(){ deseneaza=false; }
  canvas.addEventListener("mousedown", start); canvas.addEventListener("mousemove", move);
  window.addEventListener("mouseup", stop);
  canvas.addEventListener("touchstart", start, {passive:false});
  canvas.addEventListener("touchmove", move, {passive:false});
  canvas.addEventListener("touchend", stop);
}

/* ===================== GENERARE PDF + FINALIZARE ===================== */
async function genereazaSiFinalizeaza(){
  incarcare(true, "Se generează documentul...");
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
    const s = state.sarcinaActiva;
    const { client, produs, contract } = state.detaliiSarcinaActiva;
    const masina = state._masiniCache; // optional
    const azi = new Date();
    const latimePag = 210;

    // --- ANTET ---
    const NAVY = [22,38,79];
    try{
      // logo pastreaza raportul original ~700x217 -> latime 55mm, inaltime proportionala
      const latLogo = 55, inaltLogo = latLogo * (217/700);
      doc.addImage(LOGO_EEC_BASE64, "PNG", 14, 8, latLogo, inaltLogo);
    }catch(e){ /* daca esueaza incarcarea logo-ului, continuam fara el */ }
    doc.setTextColor(90,100,94); doc.setFont("helvetica","normal"); doc.setFontSize(8.5);
    doc.text("SC Euro Ecologic SRL · Hunedoara", latimePag-14, 12, {align:"right"});
    doc.text("Închiriere și servisare toalete ecologice, containere, garduri", latimePag-14, 16.5, {align:"right"});
    doc.setDrawColor(...NAVY); doc.setLineWidth(0.6);
    doc.line(14, 28, latimePag-14, 28);

    doc.setTextColor(...NAVY);
    let y = 38;
    doc.setFont("helvetica","bold"); doc.setFontSize(14);
    const titluDoc = `PROCES VERBAL DE ${(LABEL_TIP[s.tip_actiune]||s.tip_actiune).toUpperCase()}`;
    doc.text(titluDoc, 14, y); y+=6;
    doc.setFont("helvetica","normal"); doc.setFontSize(10);
    doc.text(`Nr. ${state.nrPv}  ·  Data: ${azi.toLocaleDateString("ro-RO")}`, 14, y); y+=10;

    function linie(label, valoare){
      doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.text(label+":", 14, y);
      doc.setFont("helvetica","normal"); doc.text(String(valoare||"-"), 62, y);
      y += 7;
    }
    linie("Client", client?.nume);
    linie("Adresă client", [client?.adresa, client?.localitate, client?.judet].filter(Boolean).join(", "));
    linie("Contract", contract?.nr_contract);
    linie("Produs", produs ? produs.model + (produs.serie?(" ("+produs.serie+")"):"") : "-");
    linie("Cantitate", s.cantitate);
    linie("Adresă intervenție", [s.locatie_adresa, s.locatie_localitate, s.locatie_judet].filter(Boolean).join(", "));
    linie("Șofer", state.soferCurent.nume);
    y += 4;

    doc.setDrawColor(225,228,223); doc.line(14, y, latimePag-14, y); y+=8;

    doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text("AVIZ DE ÎNSOȚIRE A MĂRFII", 14, y); y+=7;
    doc.setFont("helvetica","normal"); doc.setFontSize(9.5);
    const textAviz = `Prezentul document însoțește transportul/intervenția asupra produsului mai sus menționat, efectuat(ă) de SC Euro Ecologic SRL la data de ${azi.toLocaleDateString("ro-RO")}, conform contractului ${contract?.nr_contract||"-"} încheiat cu ${client?.nume||"-"}.`;
    const linii = doc.splitTextToSize(textAviz, latimePag-28);
    doc.text(linii, 14, y); y += linii.length*5 + 8;

    doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text("Checklist execuție", 14, y); y+=7;
    doc.setFont("helvetica","normal"); doc.setFontSize(9.5);
    (CHECKLISTE[s.tip_actiune]||[]).forEach((txt)=>{
      doc.text(`✓  ${txt}`, 16, y); y+=6;
    });
    y += 6;

    // --- SEMNATURA ---
    if(y > 230) { doc.addPage(); y = 20; }
    doc.setFont("helvetica","bold"); doc.setFontSize(10.5);
    doc.text(`Semnătură (${state.semnatarTip==='client'?'client':'șofer, în confirmare'}):`, 14, y); y+=4;
    if(state.semnaturaDataUrl){
      doc.addImage(state.semnaturaDataUrl, "PNG", 14, y, 70, 30);
    }
    y += 36;
    doc.setFontSize(8.5); doc.setTextColor(95,109,100);
    doc.text("Document generat automat pe dispozitivul mobil al șoferului. Nu se stochează pe server.", 14, y);

    // --- ANEXA FOTO ---
    if(state.poze.length){
      state.poze.forEach((p)=>{
        doc.addPage();
        doc.setFillColor(22,38,79); doc.rect(0,0,latimePag,16,"F");
        doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(11);
        doc.text("ANEXĂ FOTO — "+state.nrPv, 14, 10.5);
        const propInalt = 250; // aprox spatiu disponibil in mm
        try{
          const props = doc.getImageProperties(p.dataUrl);
          const raport = props.height / props.width;
          let w = latimePag - 28; let h = w*raport;
          if(h > propInalt){ h = propInalt; w = h/raport; }
          doc.addImage(p.dataUrl, "JPEG", 14, 24, w, h);
        }catch(e){ /* ignoram poza care nu poate fi adaugata */ }
      });
    }

    const numeFisier = `PV_${state.nrPv}_${(client?.nume||"client").replace(/[^a-zA-Z0-9]/g,"_")}.pdf`;
    const blob = doc.output("blob");
    const file = new File([blob], numeFisier, {type:"application/pdf"});

    incarcare(false);

    // incercam trimiterea nativa (share sheet) daca e disponibila
    let trimisPrinShare = false;
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({ files:[file], title: numeFisier, text: `Proces verbal ${state.nrPv} — ${client?.nume||""}` });
        trimisPrinShare = true;
      }catch(err){ /* utilizatorul a anulat share-ul, continuam oricum */ }
    }
    if(!trimisPrinShare){
      // fallback: descarcam local documentul, ca sofer sa il poata trimite manual
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = numeFisier;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
      toast("Document descărcat — trimite-l manual din Fișiere/Galerie");
    }

    // marcam finalizat in baza de date (doar text, fara fisier)
    incarcare(true, "Se salvează statusul...");
    await q(supa.from("sarcini").update({
      status: "finalizat", nr_pv: state.nrPv, updated_at: new Date().toISOString()
    }).eq("id", state.sarcinaActiva.id), "Nu am putut salva statusul");

    incarcare(false);
    toast("Sarcină finalizată ✓");
    state.ecran = "lista";
    randApp();

  }catch(err){
    console.error(err);
    incarcare(false);
    toast("Eroare la generarea documentului: "+err.message, true);
  }
}

if(state.soferCurent) state.ecran = "lista";
