<style>
:root{
  --verde-inchis:#173d2c;
  --verde:#2f7a52;
  --verde-hover:#25603f;
  --verde-pal:#eaf3ec;
  --fundal:#f5f6f4;
  --card:#ffffff;
  --linie:#e1e4df;
  --text:#1b2621;
  --text-slab:#5f6d64;
  --galben:#c98a1f;
  --galben-bg:#fbf1de;
  --albastru:#2f6fa8;
  --albastru-bg:#e9f1f9;
  --verde-status:#2f8f5b;
  --verde-status-bg:#e6f4ec;
  --rosu:#c1443f;
  --rosu-bg:#faeaea;
  --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',sans-serif;background:var(--fundal);color:var(--text);}
h1,h2,h3,.brand{font-family:'Manrope',sans-serif;}

/* Layout */
.app{display:flex;min-height:100vh;}
.sidebar{
  width:230px;background:var(--verde-inchis);color:#eafaf0;display:flex;flex-direction:column;
  padding:22px 14px;flex-shrink:0;
}
.brand{font-size:18px;font-weight:800;color:#fff;padding:0 10px 4px;letter-spacing:.2px;}
.brand small{display:block;font-family:'Inter';font-weight:400;font-size:11.5px;color:#9fc7ac;margin-top:2px;}
.nav{margin-top:26px;display:flex;flex-direction:column;gap:3px;}
.nav button{
  all:unset;cursor:pointer;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:600;
  color:#cfe8db;display:flex;align-items:center;gap:9px;
}
.nav button:hover{background:#1f5238;}
.nav button.activ{background:var(--verde);color:#fff;}
.sidebar-footer{margin-top:auto;font-size:11px;color:#7fa992;padding:0 10px;}

.main{flex:1;padding:26px 34px;overflow-x:hidden;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.top-bar h1{font-size:21px;margin:0;}
.top-bar .sub{color:var(--text-slab);font-size:13px;margin-top:2px;}

.btn{
  all:unset;cursor:pointer;background:var(--verde);color:#fff;padding:9px 16px;border-radius:8px;
  font-size:13.5px;font-weight:700;font-family:'Inter';display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{background:var(--verde-hover);}
.btn.secundar{background:#fff;color:var(--verde);border:1.5px solid var(--verde);}
.btn.secundar:hover{background:var(--verde-pal);}
.btn.mic{padding:6px 11px;font-size:12.5px;}
.btn.pericol{background:var(--rosu);}
.btn.pericol:hover{background:#a5322e;}
.btn[disabled]{opacity:.5;cursor:not-allowed;}

input,select,textarea{
  font-family:'Inter';font-size:13.5px;padding:9px 11px;border:1.5px solid var(--linie);border-radius:8px;
  background:#fff;color:var(--text);width:100%;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--verde);}
label{font-size:12px;font-weight:600;color:var(--text-slab);display:block;margin-bottom:5px;}
.camp{margin-bottom:13px;}
.rand-campuri{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.card{background:var(--card);border:1px solid var(--linie);border-radius:var(--radius);padding:16px 18px;}
.card + .card{margin-top:10px;}

.badge{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap;}
.badge.pendinte{background:var(--galben-bg);color:var(--galben);}
.badge.in_lucru{background:var(--albastru-bg);color:var(--albastru);}
.badge.finalizat{background:var(--verde-status-bg);color:var(--verde-status);}
.badge.problema{background:var(--rosu-bg);color:var(--rosu);}
.badge.tip-actiune{background:#eef0ec;color:#4b564f;}

.filtre{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.filtre button{
  all:unset;cursor:pointer;padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:700;
  background:#fff;border:1.5px solid var(--linie);color:var(--text-slab);
}
.filtre button.activ{background:var(--verde);color:#fff;border-color:var(--verde);}

.grup-sofer{margin-bottom:20px;}
.grup-sofer-header{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.grup-sofer-header .avatar{
  width:30px;height:30px;border-radius:50%;background:var(--verde);color:#fff;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;
}
.grup-sofer-header h3{margin:0;font-size:15px;}
.grup-sofer-header .nr{color:var(--text-slab);font-size:12px;font-weight:600;}

.sarcina-item{
  display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;
  border:1px solid var(--linie);border-radius:8px;background:#fff;cursor:pointer;margin-bottom:7px;
}
.sarcina-item:hover{border-color:var(--verde);}
.sarcina-item .info{display:flex;flex-direction:column;gap:3px;}
.sarcina-item .client{font-weight:700;font-size:13.5px;}
.sarcina-item .detalii{font-size:12px;color:var(--text-slab);}
.sarcina-item .dreapta{display:flex;align-items:center;gap:9px;flex-shrink:0;}

.tabel-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--text-slab);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;
  padding:9px 10px;border-bottom:2px solid var(--linie);}
td{padding:11px 10px;border-bottom:1px solid var(--linie);}
tr.clicabil{cursor:pointer;}
tr.clicabil:hover td{background:var(--verde-pal);}

.doua-coloane{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start;}
.lista-scroll{max-height:72vh;overflow-y:auto;}
.item-lista{padding:11px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;}
.item-lista:hover{background:var(--verde-pal);}
.item-lista.activ{background:var(--verde);color:#fff;}
.item-lista .titlu{font-weight:700;font-size:13.5px;}
.item-lista .sub{font-size:11.5px;color:var(--text-slab);}
.item-lista.activ .sub{color:#dff0e5;}

.search{margin-bottom:10px;}

.gol{text-align:center;padding:50px 20px;color:var(--text-slab);}
.gol .emoji{font-size:34px;margin-bottom:8px;}

/* Modal */
.overlay{
  position:fixed;inset:0;background:rgba(15,30,22,.45);display:none;align-items:flex-start;justify-content:center;
  padding:40px 16px;z-index:50;overflow-y:auto;
}
.overlay.deschis{display:flex;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;padding:24px 26px;margin-bottom:40px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-header h2{margin:0;font-size:17px;}
.modal-close{all:unset;cursor:pointer;font-size:20px;color:var(--text-slab);padding:2px 6px;}
.modal-close:hover{color:var(--text);}
.modal-actiuni{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;border-top:1px solid var(--linie);padding-top:16px;}

.detalii-linie{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--linie);font-size:13.5px;}
.detalii-linie span:first-child{color:var(--text-slab);}
.detalii-linie span:last-child{font-weight:600;text-align:right;}

.toast{
  position:fixed;bottom:22px;right:22px;background:var(--verde-inchis);color:#fff;padding:12px 18px;border-radius:9px;
  font-size:13.5px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:100;opacity:0;transform:translateY(8px);
  transition:.25s;pointer-events:none;
}
.toast.arata{opacity:1;transform:translateY(0);}
.toast.eroare{background:var(--rosu);}

.chip-stare{padding:4px 10px;border-radius:6px;font-size:11.5px;font-weight:700;}
.chip-stare.depozit{background:var(--albastru-bg);color:var(--albastru);}
.chip-stare.la_client{background:var(--verde-status-bg);color:var(--verde-status);}
.chip-stare.service{background:var(--galben-bg);color:var(--galben);}

.stat-mini{display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap;}
.stat-card{background:#fff;border:1px solid var(--linie);border-radius:10px;padding:13px 18px;min-width:118px;}
.stat-card .nr{font-size:22px;font-weight:800;font-family:'Manrope';}
.stat-card .lbl{font-size:11.5px;color:var(--text-slab);font-weight:600;}

@media(max-width:880px){
  .app{flex-direction:column;}
  .sidebar{width:100%;flex-direction:row;align-items:center;padding:12px 16px;overflow-x:auto;}
  .brand{display:none;}
  .nav{flex-direction:row;margin-top:0;}
  .sidebar-footer{display:none;}
  .doua-coloane{grid-template-columns:1fr;}
  .main{padding:16px;}
  .rand-campuri{grid-template-columns:1fr;}
}
</style>
</head>

const state = {
  tab: "sarcini",
  cache: { clienti:[], contracte:[], produse:[], soferi:[], masini:[], sarcini:[], facturi:[], depozite:[], anexe:[], documente:[] },
  sarciniData: new Date().toISOString().slice(0,10),
  sarciniLuna: new Date().toISOString().slice(0,7), // YYYY-MM, pentru tab-ul Comenzi
  sarciniFiltru: "toate",
  raportLuna: new Date().toISOString().slice(0,7), // format YYYY-MM
  verifData: new Date().toISOString().slice(0,10),
  verifRutaId: "",
  verifSubEcran: "zilnic",
  comenziLuna: new Date().toISOString().slice(0,7), // format YYYY-MM, pt tab-ul Comenzi
  clientSelectat: null,
  contractSelectat: null,
};

const LABEL_TIP = {AMPLASARE:"Amplasare", SUPLIMENTARE:"Suplimentare", REDUCERE:"Reducere", RIDICARE:"Ridicare", SERVISARE:"Servisare", TRANSFER:"Transfer", RECALIBRARE:"Recalibrare stoc"};
const LABEL_STATUS = {pendinte:"Pendinte", in_lucru:"În lucru", finalizat:"Finalizat", problema:"Problemă"};
const LABEL_STARE = {depozit:"Depozit", la_client:"La client", service:"Service"};

/* ===================== UTILITARE ===================== */
function toast(msg, eroare=false){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast arata" + (eroare ? " eroare" : "");
  setTimeout(()=> t.className = "toast", 2800);
}
function esc(s){ return (s===null||s===undefined) ? "" : String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtData(d){ if(!d) return "-"; const dt = new Date(d); return dt.toLocaleDateString("ro-RO",{day:"2-digit",month:"2-digit",year:"numeric"}); }
function initiale(nume){ return (nume||"?").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase(); }
function deschideModal(html){
  document.getElementById("modal").innerHTML = html;
  document.getElementById("overlay").classList.add("deschis");
}
function inchideModal(){ document.getElementById("overlay").classList.remove("deschis"); }
document.getElementById("overlay").addEventListener("click", e=>{ if(e.target.id==="overlay") inchideModal(); });

async function q(promise, mesajEroare="Eroare la operație"){
  const { data, error } = await promise;
  if(error){ console.error(error); toast(mesajEroare + ": " + error.message, true); throw error; }
  return data;
}

/* ===================== NAVIGARE TAB-URI ===================== */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("activ"));
    btn.classList.add("activ");
    state.tab = btn.dataset.tab;
    renderTab();
  });
});

function renderTab(){
  if(state.tab==="sarcini") renderSarcini();
  else if(state.tab==="clienti") renderClienti();
  else if(state.tab==="produse") renderProduse();
  else if(state.tab==="facturi") renderFacturi();
  else if(state.tab==="depozite") renderDepozite();
  else if(state.tab==="documente") renderDocumente();
  else if(state.tab==="raport") renderRaportLunar();
  else if(state.tab==="verificare-ruta") renderVerificareRuta();
  else if(state.tab==="resurse") renderResurse();
}

async function asiguraDepoziteIncarcate(){
  if(!state.cache.depozite || state.cache.depozite.length===0){
    state.cache.depozite = await q(supa.from("depozite").select("*").order("este_propriu",{ascending:false}).order("nume"), "Nu am putut încărca depozitele");
  }
  return state.cache.depozite;
}

async function asiguraRuteIncarcate(){
  state.cache.rute = await q(supa.from("rute").select("*").order("nume"), "Nu am putut încărca rutele");
  return state.cache.rute;
}

/* Genereaza textul concatenat (ca in Excel), gata de copiat pe WhatsApp/email */
function genereazaTextComanda(s, contract, client, anexa, produs, depozitComercial, depozitSursa){
  const zileSaptamana = ["duminică","luni","marți","miercuri","joi","vineri","sâmbătă"];
  const dt = new Date(s.data);
  const zi = `${zileSaptamana[dt.getDay()]} - ${String(dt.getDate()).padStart(2,"0")}.${String(dt.getMonth()+1).padStart(2,"0")}.${dt.getFullYear()}`;
  const cantitateSemnata = (s.tip_actiune==="RIDICARE" || s.tip_actiune==="REDUCERE") ? -Math.abs(s.cantitate||0) : Math.abs(s.cantitate||0);
  return `*${s.tip_actiune}*    ${zi}    ${cantitateSemnata}    ${produs?.categorie||""}    ${produs?.model||""}    `+
    `NUME CL: ${client?.nume||"-"}    JUD.: ${anexa?.locatie_judet||"-"}    LOC.: ${anexa?.locatie_localitate||"-"}    ${anexa?.locatie_adresa||"-"}    `+
    `PERS. RES.: ${anexa?.persoana_contact||"-"}    TEL.: ${anexa?.telefon||"-"}    SERVISARE: ${anexa?.frecventa_servisare||"-"}    `+
    `CTR.: ${depozitComercial?.nume||"-"}    DEP.: ${depozitSursa?.nume||"-"}    ROG PV DE - ${s.tip_actiune}`;
}

/* ===================================================================
   TAB 1 — SARCINI ZILEI
   =================================================================== */
async function incarcaSarciniData(){
  const [an, luna] = state.sarciniLuna.split("-").map(Number);
  const zileInLuna = new Date(an, luna, 0).getDate();
  const dataInceput = `${state.sarciniLuna}-01`;
  const dataSfarsit = `${state.sarciniLuna}-${String(zileInLuna).padStart(2,"0")}`;
  const sarcini = await q(supa.from("sarcini").select("*").gte("data", dataInceput).lte("data", dataSfarsit).order("data"), "Nu am putut încărca comenzile");
  const [contracte, produse, soferi, masini, clienti, anexe] = await Promise.all([
    q(supa.from("contracte").select("*")), q(supa.from("produse").select("*")),
    q(supa.from("soferi").select("*")), q(supa.from("masini").select("*")), q(supa.from("clienti").select("*")),
    q(supa.from("anexe").select("*")),
  ]);
  state.cache = {...state.cache, sarcini, contracte, produse, soferi, masini, clienti, anexe};
}

function locatieSarcina(s){
  const anexa = state.cache.anexe.find(a=>a.id===s.anexa_id);
  if(anexa) return [anexa.locatie_localitate, anexa.locatie_adresa].filter(Boolean).join(" · ");
  return [s.locatie_localitate, s.locatie_adresa].filter(Boolean).join(" · "); // compatibilitate cu sarcini vechi, fara anexa
}

function numeClientDinContract(contractId){
  const c = state.cache.contracte.find(x=>x.id===contractId);
  if(!c) return "-";
  const cl = state.cache.clienti.find(x=>x.id===c.client_id);
  return cl ? cl.nume : "-";
}

async function renderSarcini(){
  const main = document.getElementById("main");
  main.innerHTML = `<div class="gol">Se încarcă...</div>`;
  await incarcaSarciniData();

  let sarcini = state.cache.sarcini;
  if(state.sarciniFiltru !== "toate") sarcini = sarcini.filter(s=>s.status===state.sarciniFiltru);

  const stats = {
    pendinte: state.cache.sarcini.filter(s=>s.status==="pendinte").length,
    in_lucru: state.cache.sarcini.filter(s=>s.status==="in_lucru").length,
    finalizat: state.cache.sarcini.filter(s=>s.status==="finalizat").length,
    problema: state.cache.sarcini.filter(s=>s.status==="problema").length,
  };

  main.innerHTML = `
    <div class="top-bar">
      <div>
        <h1>Comenzi</h1>
        <div class="sub">Toată luna, grupat pe zi și pe șofer</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="month" id="input-luna" value="${state.sarciniLuna}" style="width:auto;">
        <button class="btn" id="btn-sarcina-noua">+ Comandă nouă</button>
      </div>
    </div>

    <div class="stat-mini">
      <div class="stat-card"><div class="nr">${stats.pendinte}</div><div class="lbl">Pendinte</div></div>
      <div class="stat-card"><div class="nr">${stats.in_lucru}</div><div class="lbl">În lucru</div></div>
      <div class="stat-card"><div class="nr">${stats.finalizat}</div><div class="lbl">Finalizat</div></div>
      <div class="stat-card"><div class="nr">${stats.problema}</div><div class="lbl">Problemă</div></div>
    </div>

    <div class="filtre">
      ${["toate","pendinte","in_lucru","finalizat","problema"].map(f=>`
        <button data-f="${f}" class="${state.sarciniFiltru===f?'activ':''}">${f==="toate"?"Toate":LABEL_STATUS[f]}</button>
      `).join("")}
    </div>

    <div id="lista-grupuri"></div>
  `;

  document.getElementById("input-luna").addEventListener("change", e=>{ state.sarciniLuna = e.target.value; renderSarcini(); });
  document.getElementById("btn-sarcina-noua").addEventListener("click", deschideModalSarcinaNoua);
  main.querySelectorAll(".filtre button").forEach(b=>b.addEventListener("click", ()=>{ state.sarciniFiltru = b.dataset.f; renderSarcini(); }));

  const grupuri = document.getElementById("lista-grupuri");
  if(sarcini.length===0){
    grupuri.innerHTML = `<div class="gol"><div class="emoji">🗓️</div>Nicio comandă în această lună${state.sarciniFiltru!=="toate" ? " cu acest filtru" : ""}.</div>`;
    return;
  }

  // grupam pe zi, apoi pe sofer in interiorul zilei
  const grupePeZi = {};
  sarcini.forEach(s=>{ (grupePeZi[s.data] = grupePeZi[s.data] || []).push(s); });

  const azi = new Date().toISOString().slice(0,10);
  let html = "";
  Object.keys(grupePeZi).sort().forEach(zi=>{
    const sarciniZi = grupePeZi[zi];
    const grupePeSofer = {};
    sarciniZi.forEach(s=>{
      const key = s.sofer_id || "_nealocat";
      (grupePeSofer[key] = grupePeSofer[key] || []).push(s);
    });

    html += `<div class="grup-zi-titlu" style="font-weight:800;font-size:14.5px;margin:22px 0 10px;color:var(--verde-inchis);border-bottom:2px solid var(--linie);padding-bottom:6px;">
      ${zi===azi?"🔵 Azi — ":""}${fmtData(zi)} <span style="font-weight:600;color:var(--text-slab);font-size:12.5px;">(${sarciniZi.length} comenzi)</span>
    </div>`;

    Object.keys(grupePeSofer).forEach(soferId=>{
      const sofer = state.cache.soferi.find(s=>s.id===soferId);
      const numeSofer = sofer ? sofer.nume : "Nealocat";
      const lista = grupePeSofer[soferId];
      html += `
        <div class="grup-sofer">
          <div class="grup-sofer-header">
            <div class="avatar">${initiale(numeSofer)}</div>
            <h3>${esc(numeSofer)}</h3>
            <span class="nr">${lista.length} comenzi</span>
          </div>
          ${lista.map(s=>{
            const produs = state.cache.produse.find(p=>p.id===s.produs_id);
            return `
            <div class="sarcina-item" data-id="${s.id}">
              <div class="info">
                <div class="client">${esc(numeClientDinContract(s.contract_id))} ${produs ? "— "+esc(produs.model) : ""}</div>
                <div class="detalii">${esc(locatieSarcina(s)) || "locație nespecificată"}</div>
              </div>
              <div class="dreapta">
                <span class="badge tip-actiune">${LABEL_TIP[s.tip_actiune]||s.tip_actiune}</span>
                <span class="badge ${s.status}">${LABEL_STATUS[s.status]||s.status}</span>
              </div>
            </div>`;
          }).join("")}
        </div>
      `;
    });
  });
  grupuri.innerHTML = html;
  grupuri.querySelectorAll(".sarcina-item").forEach(el=>{

/* Calculeaza cantitatea activa curenta pentru o anexa + un produs, din istoricul complet de sarcini */
async function calculeazaCantitateActiva(anexaId, produsId){
  if(!anexaId || !produsId) return null;
  const istoric = await q(
    supa.from("sarcini").select("tip_actiune,cantitate,data").eq("anexa_id", anexaId).eq("produs_id", produsId).order("data"),
    "Nu am putut calcula cantitatea activă"
  );
  let total = 0;
  istoric.forEach(s=>{
    const cant = s.cantitate || 0;
    if(s.tip_actiune === "RECALIBRARE") total = cant;
    else if(s.tip_actiune === "AMPLASARE" || s.tip_actiune === "SUPLIMENTARE") total += cant;
    else if(s.tip_actiune === "REDUCERE" || s.tip_actiune === "RIDICARE") total -= cant;
  });
  return total;
}

function suggereazaTipActiune(cantitateActiva, cantitateCeruta){
  if(cantitateActiva === null || cantitateActiva === 0) return "AMPLASARE";
  const rezultat = cantitateActiva - cantitateCeruta;
  // presupunem implicit "adaugare" cand se completeaza cantitate; utilizatorul alege explicit daca e retragere
  return "SUPLIMENTARE";
}

/* Ajusteaza stocul propriu (Hunedoara) dupa o miscare, doar daca depozitul sursa e cel propriu */
async function ajusteazaStocDupaSarcina(depozitSursaId, produsId, tipActiune, cantitate){
  if(!produsId || !depozitSursaId || !cantitate) return;
  await asiguraDepoziteIncarcate();
  const depozit = state.cache.depozite.find(d=>d.id===depozitSursaId);
  if(!depozit || !depozit.este_propriu) return; // stocul nostru se schimba doar daca miscarea implica depozitul propriu

  let delta = 0;
  if(tipActiune === "AMPLASARE" || tipActiune === "SUPLIMENTARE") delta = -cantitate;
  else if(tipActiune === "REDUCERE" || tipActiune === "RIDICARE") delta = cantitate;
  if(delta === 0) return;

  const produsActual = await q(supa.from("produse").select("stoc_hunedoara").eq("id", produsId).single(), "Nu am putut citi stocul");
  const stocNou = (produsActual.stoc_hunedoara || 0) + delta;
  await q(supa.from("produse").update({stoc_hunedoara: stocNou}).eq("id", produsId), "Nu am putut actualiza stocul");
}

      masina_id, // dedusa din alocarea traseului pt ziua saptamanii respectiva
      status: "pendinte",
    };
    await q(supa.from("sarcini").insert(payload), "Nu am putut crea comanda");
    if(produs_id && cantitate && depozit_sursa_id){
      await ajusteazaStocDupaSarcina(depozit_sursa_id, produs_id, tip_actiune, cantitate);
    }
    toast("Comandă creată");
    inchideModal();
    state.sarciniData = payload.data;
    renderSarcini();
  });
}

async function deschideDetaliiAnexa(anexaId, contractId){
  const a = state.cache.anexe.find(x=>x.id===anexaId);
  const sarciniAnexa = await q(supa.from("sarcini").select("*").eq("anexa_id", anexaId).order("data",{ascending:false}), "Nu am putut încărca comenzile anexei");
  const produse = state.cache.produse.length ? state.cache.produse : await q(supa.from("produse").select("*"));
  state.cache.produse = produse;
  await asiguraRuteIncarcate();
  const programariAnexa = await q(supa.from("programari_servisare").select("*").eq("anexa_id", anexaId).eq("activ", true), "Nu am putut încărca zilele de servisare");

  // cantitate activa per produs implicat in aceasta anexa
  const produseImplicate = [...new Set(sarciniAnexa.filter(s=>s.produs_id).map(s=>s.produs_id))];
  const cantitatiActive = {};
  for(const pid of produseImplicate){ cantitatiActive[pid] = await calculeazaCantitateActiva(anexaId, pid); }

  deschideModal(`
    <div class="modal-header"><h2>Anexa ${esc(a.nr_anexa||"")}</h2><button class="modal-close" onclick="inchideModal()">✕</button></div>
    <div class="detalii-linie"><span>Locație</span><span>${esc([a.locatie_localitate,a.locatie_judet].filter(Boolean).join(", "))||"-"}</span></div>
    <div class="detalii-linie"><span>Adresă</span><span>${esc(a.locatie_adresa||"-")}</span></div>
    <div class="detalii-linie"><span>Contact</span><span>${esc(a.persoana_contact||"-")} ${a.telefon?("· "+esc(a.telefon)):""}</span></div>
    <div class="detalii-linie"><span>Frecvență servisare</span><span>${esc(a.frecventa_servisare||"-")}</span></div>

    <h3 style="font-size:13.5px;margin:16px 0 8px;">Zile de servisare alocate (pentru Verificare Rută)</h3>
    <div id="lista-programari-servisare">
      ${programariAnexa.length ? programariAnexa.map(p=>{
        const ruta = state.cache.rute.find(r=>r.id===p.ruta_id);
        return `<div class="detalii-linie"><span>${ZILE_SAPTAMANA[p.zi_saptamana]} — ${esc(ruta?.nume||"(fără rută)")}</span><span><button class="btn pericol mic btn-sterge-progserv" data-id="${p.id}">Șterge</button></span></div>`;
      }).join("") : `<div class="sub" style="color:var(--text-slab);font-size:12.5px;">Nicio zi alocată încă.</div>`}
    </div>
    <div class="rand-campuri" style="margin-top:10px;">
      <div class="camp">
        <label>Zi nouă</label>
        <select id="sel-zi-noua">${Object.entries(ZILE_SAPTAMANA).map(([n,l])=>`<option value="${n}">${l}</option>`).join("")}</select>
      </div>
      <div class="camp">
        <label>Rută</label>
        <select id="sel-ruta-noua">
          <option value="">— fără rută —</option>
          ${state.cache.rute.map(r=>`<option value="${r.id}">${esc(r.nume)}</option>`).join("")}
        </select>
      </div>
    </div>
    <button class="btn secundar mic" id="btn-adauga-progserv" style="margin-bottom:16px;">+ Adaugă zi de servisare</button>

    <h3 style="font-size:13.5px;margin:16px 0 8px;">Produse active pe această locație</h3>
    ${produseImplicate.length ? produseImplicate.map(pid=>{
      const p = produse.find(x=>x.id===pid);
      const cant = cantitatiActive[pid];
      if(!cant || cant<=0) return "";
      return `<div class="detalii-linie"><span>${esc(p?.model||"-")}</span><span><b>${cant}</b> buc.</span></div>`;
    }).join("") || `<div class="sub" style="color:var(--text-slab);font-size:12.5px;">Niciun produs activ momentan.</div>` : `<div class="sub" style="color:var(--text-slab);font-size:12.5px;">Niciun produs activ momentan.</div>`}
    <h3 style="font-size:13.5px;margin:16px 0 8px;">Istoric mișcări (${sarciniAnexa.length})</h3>
    <div style="max-height:200px;overflow-y:auto;">
    ${sarciniAnexa.length ? sarciniAnexa.map(s=>{
      const p = produse.find(x=>x.id===s.produs_id);
      return `<div class="detalii-linie"><span>${LABEL_TIP[s.tip_actiune]||s.tip_actiune} · ${p?.model||"-"} (${s.cantitate||"-"} buc) · ${fmtData(s.data)}</span><span class="badge ${s.status}">${LABEL_STATUS[s.status]}</span></div>`;
    }).join("") : `<div class="sub" style="color:var(--text-slab);font-size:12.5px;">Nicio mișcare încă.</div>`}
    </div>
    <div class="modal-actiuni">
      <button class="btn secundar mic" id="btn-edit-anexa">Editează anexă</button>
      <button class="btn mic" onclick="deschideDetaliiContract('${contractId}')">← Înapoi la contract</button>
    </div>
  `);
  document.getElementById("btn-edit-anexa").addEventListener("click", ()=>deschideModalAnexaEdit(a));
  document.getElementById("btn-adauga-progserv").addEventListener("click", async ()=>{
    const zi_saptamana = parseInt(document.getElementById("sel-zi-noua").value);
    const ruta_id = document.getElementById("sel-ruta-noua").value || null;
    await q(supa.from("programari_servisare").insert({anexa_id: anexaId, zi_saptamana, ruta_id, activ:true}), "Nu am putut salva ziua de servisare");
    toast("Zi de servisare adăugată");
    deschideDetaliiAnexa(anexaId, contractId);
  });
  document.querySelectorAll(".btn-sterge-progserv").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      await q(supa.from("programari_servisare").delete().eq("id", btn.dataset.id), "Nu am putut șterge");
      toast("Zi de servisare ștearsă");
      deschideDetaliiAnexa(anexaId, contractId);
    });
  });
}

function randProduseTabel(){
  const tbody = document.getElementById("tbody-produse");
  const filtruText = (document.getElementById("cauta-produs")?.value||"").toLowerCase();
  let lista = state.cache.produse;
  if(filtruText) lista = lista.filter(p=>[p.categorie,p.subcategorie,p.model].filter(Boolean).join(" ").toLowerCase().includes(filtruText));

  tbody.innerHTML = lista.map(p=>`
    <tr class="clicabil" data-id="${p.id}">
      <td>${esc(p.categorie||"-")}</td>
      <td>${esc(p.subcategorie||"-")}</td>
      <td>${esc(p.model)}</td>
      <td><b>${p.stoc_hunedoara ?? 0}</b> buc.</td>
      <td style="text-align:right;">✎</td>
    </tr>
  `).join("") || `<tr><td colspan="5"><div class="gol">Niciun produs găsit.</div></td></tr>`;
  tbody.querySelectorAll("tr.clicabil").forEach(tr=>tr.addEventListener("click", ()=>{
    const p = state.cache.produse.find(x=>x.id===tr.dataset.id);

  }));
}

async function renderFacturi(){

  ]);
  state.cache = {...state.cache, facturi, contracte, clienti};

  const totalNeincasat = facturi.filter(f=>f.status!=="platita").reduce((a,f)=>a+(parseFloat(f.valoare)||0),0);

  main.innerHTML = `
    <div class="top-bar">
      <div><h1>Facturi</h1><div class="sub">${facturi.length} facturi înregistrate</div></div>

  const tbody = document.getElementById("tbody-facturi");
  tbody.innerHTML = facturi.map(f=>{
    const c = contracte.find(x=>x.id===f.contract_id);
    const cl = c ? clienti.find(x=>x.id===c.client_id) : null;
    return `
      <tr class="clicabil" data-id="${f.id}">
        <td>${esc(f.nr_factura||"-")}</td>

        <td>${f.valoare ? parseFloat(f.valoare).toFixed(2)+" RON" : "-"}</td>
        <td>${fmtData(f.data_emitere)}</td>
        <td>${fmtData(f.scadenta)}</td>
        <td><span class="badge ${f.status==='platita'?'finalizat':(f.status==='restanta'?'problema':'pendinte')}">${esc(f.status||"-")}</span></td>
      </tr>

  }).join("") || `<tr><td colspan="6"><div class="gol">Nicio factură încă.</div></td></tr>`;
  tbody.querySelectorAll("tr.clicabil").forEach(tr=>tr.addEventListener("click", ()=>{
    deschideModalFacturaEdit(facturi.find(f=>f.id===tr.dataset.id));
  }));
}

const LABEL_STATUS_DOC = {de_trimis:"De trimis", trimis:"Trimis", de_primit:"De primit", primit:"Primit, semnat+ștampilat"};

async function renderDocumente(){
  const main = document.getElementById("main");
  main.innerHTML = `<div class="gol">Se încarcă...</div>`;
  const [documente, contracte, clienti] = await Promise.all([
    q(supa.from("documente").select("*").order("created_at",{ascending:false}), "Nu am putut încărca documentele"),
    q(supa.from("contracte").select("*")), q(supa.from("clienti").select("*")),
  ]);
  state.cache = {...state.cache, documente, contracte, clienti};

  const deUrmarit = documente.filter(d=>d.status_trimitere!=="trimis" || d.status_primire!=="primit").length;

  main.innerHTML = `
    <div class="top-bar">
      <div><h1>Documente</h1><div class="sub">${documente.length} înregistrate · ${deUrmarit} de urmărit (netrimise sau neprimite semnate)</div></div>
      <button class="btn" id="btn-document-nou">+ Document nou</button>
    </div>
    <div class="tabel-wrap card" style="padding:0;">
      <table>
        <thead><tr><th>Tip</th><th>Denumire</th><th>Client</th><th>Trimitere</th><th>Primire</th></tr></thead>
        <tbody id="tbody-documente"></tbody>
      </table>
    </div>
  `;
  document.getElementById("btn-document-nou").addEventListener("click", deschideModalDocumentNou);

  function numeClientContract(contractId){
    const c = contracte.find(x=>x.id===contractId); if(!c) return "-";
    const cl = clienti.find(x=>x.id===c.client_id); return cl?.nume || "-";
  }

  document.getElementById("tbody-documente").innerHTML = documente.map(d=>`
    <tr class="clicabil" data-id="${d.id}">
      <td>${esc(d.tip_document)}</td>
      <td>${esc(d.denumire||d.referinta||"-")}</td>
      <td>${esc(numeClientContract(d.contract_id))}</td>
      <td><span class="badge ${d.status_trimitere==='trimis'?'finalizat':'pendinte'}">${LABEL_STATUS_DOC[d.status_trimitere]||d.status_trimitere}</span></td>
      <td><span class="badge ${d.status_primire==='primit'?'finalizat':'problema'}">${LABEL_STATUS_DOC[d.status_primire]||d.status_primire}</span></td>
    </tr>
  `).join("") || `<tr><td colspan="5"><div class="gol">Niciun document încă.</div></td></tr>`;
  document.querySelectorAll("#tbody-documente tr.clicabil").forEach(tr=>tr.addEventListener("click", ()=>{
    deschideModalDocumentEdit(documente.find(d=>d.id===tr.dataset.id));
  }));
}

  const contracte = state.cache.contracte, clienti = state.cache.clienti;
  deschideModal(`
    <div class="modal-header"><h2>Document nou</h2><button class="modal-close" onclick="inchideModal()">✕</button></div>
    <div class="camp">
      <label>Tip document</label>
      <input id="f-tip" list="lista-tipuri-doc" placeholder="Contract / Act adițional / Anexă / altele...">
      <datalist id="lista-tipuri-doc"><option value="Contract"><option value="Act adițional"><option value="Anexă"></datalist>
    </div>

    <div class="camp">

      <select id="f-contract">
        <option value="">— fără legătură —</option>
        ${contracte.map(c=>{

   TAB 8 — RAPORT LUNAR (matrice vizuala + export Excel)
   =================================================================== */
async function renderRaportLunar(){
  const main = document.getElementById("main");
  main.innerHTML = `<div class="gol">Se încarcă...</div>`;

  const [an, luna] = state.raportLuna.split("-").map(Number);
  const zileInLuna = new Date(an, luna, 0).getDate();
  const dataInceput = `${state.raportLuna}-01`;
  const dataSfarsit = `${state.raportLuna}-${String(zileInLuna).padStart(2,"0")}`;

  const [sarciniLuna, contracte, anexe, clienti, produse] = await Promise.all([
    q(supa.from("sarcini").select("*").gte("data", dataInceput).lte("data", dataSfarsit).order("data"), "Nu am putut încărca comenzile lunii"),
    q(supa.from("contracte").select("*")), q(supa.from("anexe").select("*")),
    q(supa.from("clienti").select("*")), q(supa.from("produse").select("*")),
  ]);
  state.cache = {...state.cache, contracte, anexe, clienti, produse};

  main.innerHTML = `
    <div class="top-bar">
      <div><h1>Raport lunar</h1><div class="sub">Matrice vizuală cu toate mișcările lunii, generată automat din comenzi</div></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="month" id="input-luna-raport" value="${state.raportLuna}" style="width:auto;">
        <button class="btn secundar mic" id="btn-export-excel">⬇ Export Excel</button>
      </div>
    </div>
    <div class="sub" style="margin-bottom:14px;">${sarciniLuna.length} comenzi înregistrate în ${String(luna).padStart(2,"0")}/${an}</div>
    <div id="matrice-raport"></div>
  `;
  document.getElementById("input-luna-raport").addEventListener("change", e=>{ state.raportLuna = e.target.value; renderRaportLunar(); });
  document.getElementById("btn-export-excel").addEventListener("click", ()=>exportaRaportExcel(sarciniLuna, contracte, anexe, clienti, produse, an, luna, zileInLuna));

  const matriceEl = document.getElementById("matrice-raport");
  if(sarciniLuna.length===0){
    matriceEl.innerHTML = `<div class="gol"><div class="emoji">📅</div>Nicio comandă înregistrată în această lună.</div>`;
    return;
  }

  // grupam pe anexa (locatie); pentru fiecare zi din luna, adunam comenzile acelei zile
  const randuriPeAnexa = {};
  sarciniLuna.forEach(s=>{
    const key = s.anexa_id || ("fara-anexa-"+s.contract_id);
    if(!randuriPeAnexa[key]) randuriPeAnexa[key] = { anexa_id: s.anexa_id, contract_id: s.contract_id, zile: {} };
    const ziua = new Date(s.data).getDate();
    if(!randuriPeAnexa[key].zile[ziua]) randuriPeAnexa[key].zile[ziua] = [];
    randuriPeAnexa[key].zile[ziua].push(s);
  });

  function numeClientPtContract(contractId){
    const c = contracte.find(x=>x.id===contractId); if(!c) return "-";
    const cl = clienti.find(x=>x.id===c.client_id); return cl?.nume || "-";
  }
  function eticheteZi(lista){
    return lista.map(s=>{
      const scurt = {AMPLASARE:"A",SUPLIMENTARE:"S+",REDUCERE:"S-",RIDICARE:"R",SERVISARE:"SV",TRANSFER:"T",RECALIBRARE:"C"}[s.tip_actiune] || s.tip_actiune?.slice(0,2);
      return `${scurt}${s.cantitate?(" "+s.cantitate):""}`;
    }).join(", ");
  }

  let html = `<div class="tabel-wrap card" style="padding:0;"><table style="font-size:11.5px;">
    <thead><tr><th style="position:sticky;left:0;background:#fff;min-width:160px;">Client / Locație</th>`;
  for(let z=1; z<=zileInLuna; z++) html += `<th style="text-align:center;min-width:34px;">${z}</th>`;
  html += `</tr></thead><tbody>`;

  Object.values(randuriPeAnexa).forEach(rand=>{
    const anexa = anexe.find(a=>a.id===rand.anexa_id);
    const numeClient = numeClientPtContract(rand.contract_id);
    const locatie = anexa ? [anexa.locatie_localitate, anexa.locatie_adresa].filter(Boolean).join(" · ") : "";
    html += `<tr><td style="position:sticky;left:0;background:#fff;font-weight:600;">${esc(numeClient)}${locatie?`<br><span style="font-weight:400;color:var(--text-slab);">${esc(locatie)}</span>`:""}</td>`;
    for(let z=1; z<=zileInLuna; z++){
      const zi = rand.zile[z];
      html += `<td style="text-align:center;${zi?'background:var(--verde-pal);font-weight:700;':''}">${zi ? esc(eticheteZi(zi)) : ""}</td>`;
    }
    html += `</tr>`;
  });
  html += `</tbody></table></div>
  <div class="sub" style="margin-top:10px;">Legendă: A=Amplasare, S+=Suplimentare, S-=Reducere, R=Ridicare, SV=Servisare, T=Transfer, C=Recalibrare</div>`;
  matriceEl.innerHTML = html;
}

function exportaRaportExcel(sarciniLuna, contracte, anexe, clienti, produse, an, luna, zileInLuna){
  function numeClientPtContract(contractId){
    const c = contracte.find(x=>x.id===contractId); if(!c) return "-";
    const cl = clienti.find(x=>x.id===c.client_id); return cl?.nume || "-";
  }
  const randuri = sarciniLuna.map(s=>{
    const anexa = anexe.find(a=>a.id===s.anexa_id);
    const produs = produse.find(p=>p.id===s.produs_id);
    return {
      "Data": fmtData(s.data),
      "Client": numeClientPtContract(s.contract_id),
      "Județ": anexa?.locatie_judet || "",
      "Localitate": anexa?.locatie_localitate || "",
      "Adresă": anexa?.locatie_adresa || "",
      "Tip mișcare": LABEL_TIP[s.tip_actiune] || s.tip_actiune,
      "Produs": produs?.model || "",
      "Cantitate": s.cantitate || "",
      "Serie (notă)": s.serie_nota || "",
      "Status": LABEL_STATUS[s.status] || s.status,
      "Nr. PV": s.nr_pv || "",
    };
  });
  const ws = XLSX.utils.json_to_sheet(randuri);
  ws['!cols'] = [{wch:11},{wch:28},{wch:8},{wch:16},{wch:28},{wch:14},{wch:16},{wch:10},{wch:16},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Raport");
  XLSX.writeFile(wb, `Raport_${String(luna).padStart(2,"0")}_${an}.xlsx`);
  toast("Excel generat");
}

const ZILE_SAPTAMANA = {1:"Luni",2:"Marți",3:"Miercuri",4:"Joi",5:"Vineri",6:"Sâmbătă",7:"Duminică"};
const LABEL_COD = {L:"Lipsă acces", O:"Omis", R:"Refuzat", A:"Amânat", V:"Vacanță/nelocuit", S:"Suspendat", M:"Mutat"};

function ziSaptamanaDinData(dataStr){
  const js = new Date(dataStr).getDay(); // 0=Duminica...6=Sambata
  return js===0 ? 7 : js;
}

async function renderVerificareRuta(){
  const main = document.getElementById("main");
  main.innerHTML = `<div class="gol">Se încarcă...</div>`;
  await asiguraRuteIncarcate();

  main.innerHTML = `
    <div class="top-bar">
      <div><h1>Verificare Rută</h1><div class="sub">Confirmare zilnică — ca la verificarea GPS de dimineață</div></div>
    </div>

    </div>
    <div id="zona-verificare-ruta"></div>
  `;
  main.querySelectorAll(".filtre button").forEach(b=>b.addEventListener("click", ()=>{ state.verifSubEcran = b.dataset.sub; renderVerificareRuta(); }));

  if(state.verifSubEcran==="raport") await randRaport4Saptamani();
  else await randVerificareZilnica();
}

async function randVerificareZilnica(){
  const [anexe, contracte, clienti, programari] = await Promise.all([
    q(supa.from("anexe").select("*")), q(supa.from("contracte").select("*")), q(supa.from("clienti").select("*")),
    q(supa.from("programari_servisare").select("*").eq("activ", true)),
  ]);
  state.cache = {...state.cache, anexe, contracte, clienti};

  if(!state.verifRutaId && state.cache.rute.length) state.verifRutaId = state.cache.rute[0].id;
  const ziNr = ziSaptamanaDinData(state.verifData);

  const zona = document.getElementById("zona-verificare-ruta");
  zona.innerHTML = `
    <div class="rand-campuri" style="max-width:520px;margin-top:12px;">
      <div class="camp">
        <label>Data</label>
        <input type="date" id="input-verif-data" value="${state.verifData}">

      </div>
      <div class="camp">
        <label>Rută</label>
        <select id="input-verif-ruta">
          <option value="">— selectează ruta —</option>
          ${state.cache.rute.map(r=>`<option value="${r.id}" ${state.verifRutaId===r.id?"selected":""}>${esc(r.nume)}</option>`).join("")}
        </select>
      </div>
    </div>
    <div id="lista-verificare-ruta" style="margin-top:16px;"></div>
  `;
  document.getElementById("input-verif-data").addEventListener("change", e=>{ state.verifData = e.target.value; renderVerificareRuta(); });
  document.getElementById("input-verif-ruta").addEventListener("change", e=>{ state.verifRutaId = e.target.value; renderVerificareRuta(); });

  const zonaListă = document.getElementById("lista-verificare-ruta");
  if(!state.verifRutaId){
    zonaListă.innerHTML = `<div class="gol"><div class="emoji">🗺️</div>Selectează o rută (le adaugi din tab-ul Șoferi, Mașini &amp; Trasee).</div>`;
    return;
  }

  const programariZiRuta = programari.filter(p=>p.zi_saptamana===ziNr && p.ruta_id===state.verifRutaId);
  if(programariZiRuta.length===0){
    zonaListă.innerHTML = `<div class="gol"><div class="emoji">🗺️</div>Nicio anexă alocată acestei zile+rute. Alocă zile de servisare din detaliile anexei (tab Clienți &amp; Contracte).</div>`;
    return;
  }

  // verificam ce e deja confirmat azi pt aceste anexe (comanda SERVISARE cu aceeasi data)
  const anexaIds = programariZiRuta.map(p=>p.anexa_id);
  const sarciniExistente = await q(
    supa.from("sarcini").select("*").eq("data", state.verifData).eq("tip_actiune","SERVISARE").in("anexa_id", anexaIds),
    "Nu am putut verifica confirmările existente"
  );

  function numeClientPtContract(contractId){
    const c = state.cache.contracte.find(x=>x.id===contractId); if(!c) return "-";
    const cl = state.cache.clienti.find(x=>x.id===c.client_id); return cl?.nume || "-";
  }

  zonaListă.innerHTML = `
    <div class="tabel-wrap card" style="padding:0;">
      <table>
        <thead><tr><th>Client</th><th>Locație</th><th>Frecvență</th><th>Ora sosire</th><th>Durată (min)</th><th>sau Cod</th><th></th></tr></thead>
        <tbody id="tbody-verificare"></tbody>
      </table>
    </div>
  `;
  const tbody = document.getElementById("tbody-verificare");
  tbody.innerHTML = programariZiRuta.map(p=>{
    const anexa = state.cache.anexe.find(a=>a.id===p.anexa_id);
    if(!anexa) return "";
    const existenta = sarciniExistente.find(s=>s.anexa_id===p.anexa_id);
    const confirmatNormal = existenta && !existenta.cod_observatie;
    const confirmatCuCod = existenta && existenta.cod_observatie;
    return `
      <tr data-anexa="${p.anexa_id}" data-contract="${anexa.contract_id}">
        <td>${esc(numeClientPtContract(anexa.contract_id))}</td>
        <td>${esc([anexa.locatie_localitate,anexa.locatie_adresa].filter(Boolean).join(" · "))}</td>
        <td>${esc(anexa.frecventa_servisare||"-")}</td>
        <td><input type="time" class="input-ora" value="${existenta?.ora_sosire?.slice(0,5)||""}" style="width:110px;" ${existenta?"disabled":""}></td>
        <td><input type="number" class="input-durata" value="${existenta?.durata_minute??""}" placeholder="min" style="width:80px;" ${existenta?"disabled":""}></td>
        <td>
          <select class="input-cod" style="width:150px;" ${existenta?"disabled":""}>
            <option value="">— normal —</option>
            ${Object.entries(LABEL_COD).map(([cod,label])=>`<option value="${cod}" ${existenta?.cod_observatie===cod?"selected":""}>${label}</option>`).join("")}
          </select>
        </td>
        <td>${existenta ? (confirmatCuCod ? `<span class="badge problema">${LABEL_COD[existenta.cod_observatie]||existenta.cod_observatie}</span>` : `<span class="badge finalizat">✓ Confirmat</span>${existenta.gps_sosire_lat?` <a href="https://maps.google.com/?q=${existenta.gps_sosire_lat},${existenta.gps_sosire_lon}" target="_blank" style="font-size:11px;">📍 GPS</a>`:""}`) : `<button class="btn mic btn-confirma">Salvează</button>`}</td>
      </tr>
    `;
  }).join("");

  tbody.querySelectorAll(".btn-confirma").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const tr = btn.closest("tr");
      const ora = tr.querySelector(".input-ora").value;
      const durata = tr.querySelector(".input-durata").value;
      const cod = tr.querySelector(".input-cod").value;
      if(!cod && !ora){ toast("Completează ora sosirii, sau alege un cod (Lipsă acces, Omis, etc.)", true); return; }
      await q(supa.from("sarcini").insert({
        contract_id: tr.dataset.contract, anexa_id: tr.dataset.anexa, tip_actiune: "SERVISARE",
        data: state.verifData, ora_sosire: cod ? null : ora, durata_minute: cod ? null : (parseInt(durata)||null),
        cod_observatie: cod || null,
        ruta_id: state.verifRutaId, status: cod ? "problema" : "finalizat",
      }), "Nu am putut salva confirmarea");
      toast(cod ? "Salvat cu cod de observație" : "Confirmat");
      renderVerificareRuta();
    });
  });
}

async function randRaport4Saptamani(){
  const zona = document.getElementById("zona-verificare-ruta");
  zona.innerHTML = `<div class="gol">Se încarcă raportul...</div>`;

  const azi = new Date();
  const dataStart = new Date(azi); dataStart.setDate(dataStart.getDate() - 27);
  const dataStartStr = dataStart.toISOString().slice(0,10);
  const dataSfarsitStr = azi.toISOString().slice(0,10);

  const [programari, anexe, contracte, clienti, sarciniPerioada] = await Promise.all([
    q(supa.from("programari_servisare").select("*").eq("activ", true)),
    q(supa.from("anexe").select("*")), q(supa.from("contracte").select("*")), q(supa.from("clienti").select("*")),
    q(supa.from("sarcini").select("*").eq("tip_actiune","SERVISARE").gte("data", dataStartStr).lte("data", dataSfarsitStr)),
  ]);
  state.cache = {...state.cache, anexe, contracte, clienti};

  function numeClientPtContract(contractId){
    const c = contracte.find(x=>x.id===contractId); if(!c) return "-";
    const cl = clienti.find(x=>x.id===c.client_id); return cl?.nume || "-";
  }

  // pentru fiecare programare (anexa+zi+ruta), calculam ultimele 4 date posibile (in ultimele 28 zile) pt acea zi a saptamanii
  const randuri = [];
  const anexeDeja = new Set();
  programari.forEach(p=>{
    if(anexeDeja.has(p.anexa_id+"_"+p.zi_saptamana)) return;
    anexeDeja.add(p.anexa_id+"_"+p.zi_saptamana);
    const anexa = anexe.find(a=>a.id===p.anexa_id);
    if(!anexa) return;
    const ruta = state.cache.rute.find(r=>r.id===p.ruta_id);

    // gasim toate datele din ultimele 28 zile care cad pe ziua p.zi_saptamana
    const dateOcurente = [];
    for(let i=0; i<28; i++){
      const d = new Date(azi); d.setDate(d.getDate()-i);
      const ziD = d.getDay()===0?7:d.getDay();
      if(ziD===p.zi_saptamana) dateOcurente.unshift(d.toISOString().slice(0,10));
    }
    const ultimele4 = dateOcurente.slice(-4);

    randuri.push({ anexa, ruta, zi: p.zi_saptamana, date: ultimele4 });
  });

  zona.innerHTML = `
    <div class="sub" style="margin:12px 0;">Perioada: ${fmtData(dataStartStr)} → ${fmtData(dataSfarsitStr)} (ultimele 4 apariții ale zilei alocate fiecărui client)</div>
    <div class="tabel-wrap card" style="padding:0;">
      <table style="font-size:12px;">
        <thead><tr><th>Client</th><th>Rută / Zi</th><th>V-4</th><th>V-3</th><th>V-2</th><th>V-1 (recent)</th></tr></thead>
        <tbody>
          ${randuri.map(r=>{
            const numeClient = numeClientPtContract(r.anexa.contract_id);
            const celule = r.date.map(d=>{
              const s = sarciniPerioada.find(x=>x.anexa_id===r.anexa.id && x.data===d);
              if(!s) return `<td style="text-align:center;color:var(--text-slab);">— neconfirmat</td>`;
              if(s.cod_observatie) return `<td style="text-align:center;"><span class="badge problema">${LABEL_COD[s.cod_observatie]||s.cod_observatie}</span></td>`;
              return `<td style="text-align:center;color:var(--verde-status);font-weight:700;">${s.ora_sosire?.slice(0,5)||"-"} ${s.durata_minute!=null?("("+s.durata_minute+"′"+(s.durata_secunde?(" "+s.durata_secunde+"″"):"")+")"):""}</td>`;
            });
            while(celule.length<4) celule.unshift(`<td style="text-align:center;color:var(--text-slab);">-</td>`);
            return `<tr><td>${esc(numeClient)}</td><td>${esc(r.ruta?.nume||"-")} · ${ZILE_SAPTAMANA[r.zi]}</td>${celule.join("")}</tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
    <div class="sub" style="margin-top:10px;">Verde = confirmat normal (oră + durată în minute) · Roșu = cod de observație (Lipsă acces, Omis, etc.) · Gri "— neconfirmat" = nimeni nu a introdus nimic pentru acea zi programată.</div>
  `;
}

/* ===================== PORNIRE ===================== */
renderSarcini();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
